name: Trend agent

# Kører hver time, døgnet rundt, så historikken (og dermed acceleration-signalet) bygges tæt.
on:
  schedule:
    - cron: '7 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: trend-agent
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Kør agent
        run: python agent.py
      - name: Commit snapshot + rapport
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "Trend-snapshot $(date -u '+%Y-%m-%d %H:%M')Z"
            git push
          else
            echo "ingen ændringer"
          fi
